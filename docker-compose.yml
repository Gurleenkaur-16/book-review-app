version: "3.8"

services:

  mysql:
    image: mysql:8.0
    container_name: mysql
    ports:
      - "3306:3306"
    networks:
      - threetier
    volumes:
      - mysql_data:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: my-secret-pw
      MYSQL_DATABASE: book_review_db
    restart: always
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: backend_container
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_NAME: book_review_db
      DB_USER: root
      DB_PASS: my-secret-pw
      DB_DIALECT: mysql
      PORT: 3001
      JWT_SECRET: mysecretkey
      ALLOWED_ORIGINS: https://IP:port,http://localhost:3000
    ports:
      - "3001:3001"
    networks:
      - threetier

  frontend:
    build: ./frontend
    container_name: frontend_container
    restart: always
    depends_on:
      - backend
    ports:
      - "3000:3000"
    networks:
      - threetier

volumes:
  mysql_data:

networks:
  threetier:
